function normT(t){

  const dates=Object.keys(NRI.subs).sort();
  if(dates.length===0){
    r.innerHTML='<div class="al" style="background:#e1f5ee;color:#04342c"><strong style="color:#085041">Sem substituições registadas</strong>Adiciona linhas na folha "Substitutos" do Agenda_NRI_2026.xlsx.</div>';
    return;
  }
  let h='<p style="font-size:12px;color:#666;margin-bottom:10px">'+NRI.subsCount+' substituições registadas — clica numa data para abrir o dia.</p>';
  dates.forEach(d=>{
    const dt=new Date(d+"T12:00:00");
    const wn=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
    const df=dt.toLocaleDateString("pt-PT",{day:"numeric",month:"short"});
    const wd=(dt.getDay()+6)%7;
    h+='<div class="al" style="background:#e8f5e9;color:#1b5e20;cursor:pointer" onclick="sV(\'cal\');setTimeout(()=>sD(\''+d+'\'),50)"><strong style="color:#085041">'+wn[wd]+", "+df+" ("+d+")</strong>";
    NRI.subs[d].forEach(s=>{
      h+="<div>"+s.t+" → <strong>"+s.s+"</strong>"+(s.n?' <span style="opacity:.7">· '+s.n+"</span>":"")+"</div>";
    });
    h+="</div>";
  });
  r.innerHTML=h;
}
function bO(){
  const r=document.getElementById("view-overlap");
  const meds=["MR","SC","MQR","PP","AM","AA"];
  const days=NRI.days;
  const N=days.length;
  const isMob=window.matchMedia("(pointer:coarse) and (max-width:740px)").matches;
  const isDark=window.matchMedia("(prefers-color-scheme: dark)").matches;
  const colMonth=isDark?"#fff":"#000";
  const colWeek=isDark?"#aaa":"#888";
  const colLabel=isDark?"#fff":"#000";
  const LP=44, RP=8, TP=26, GAP=12, DH=26;
  const DW=isMob?7:1.8;
  const RH=isMob?32:24;
  const W=LP+N*DW+RP;
  const chartH=TP+meds.length*RH+GAP+DH+10;
  const monthStart={};
  days.forEach((d,i)=>{const mn=parseInt(d.d.split("-")[1]);if(!(mn in monthStart)) monthStart[mn]=i;});
  const monthNames=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const todayIdx=days.findIndex(d=>d.d===TODAY);
  let s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+chartH+'" style="display:block;width:100%;height:auto;min-width:'+W+'px;font-family:inherit">';
  // weekly subtle lines
  for(let i=0;i<N;i++){
    const dt=new Date(days[i].d+"T12:00:00");
    if(dt.getDay()===1){
      const x=LP+i*DW;
      s+='<line x1="'+x+'" y1="'+TP+'" x2="'+x+'" y2="'+(TP+meds.length*RH)+'" stroke="'+colWeek+'" stroke-width="1"/>';
    }
  }
  // monthly lines + labels
  for(let m=1;m<=12;m++){
    const x0=LP+monthStart[m]*DW;
    const next=m===12?N:monthStart[m+1];
    const xMid=LP+(monthStart[m]+next)/2*DW;
    s+='<line x1="'+x0+'" y1="'+(TP-4)+'" x2="'+x0+'" y2="'+(TP+meds.length*RH+GAP+DH)+'" stroke="'+colMonth+'" stroke-width="3.5"/>';
    s+='<text x="'+xMid+'" y="'+(TP-8)+'" font-size="11" text-anchor="middle" font-weight="700" fill="'+colLabel+'">'+monthNames[m-1]+'</text>';
  }
  const xEnd=LP+N*DW;
  s+='<line x1="'+xEnd+'" y1="'+(TP-4)+'" x2="'+xEnd+'" y2="'+(TP+meds.length*RH+GAP+DH)+'" stroke="'+colMonth+'" stroke-width="3.5"/>';
  // today marker
  if(todayIdx>=0){
    const xT=LP+todayIdx*DW;
    s+='<line x1="'+xT+'" y1="'+(TP-4)+'" x2="'+xT+'" y2="'+(TP+meds.length*RH+GAP+DH)+'" stroke="#185fa5" stroke-width="1.2" stroke-dasharray="3,2"/>';
  }
  // médico rows
  meds.forEach((m,ri)=>{
    const y=TP+ri*RH;
    const c=NRI.colors[m];
    s+='<text x="'+(LP-6)+'" y="'+(y+RH/2+4)+'" font-size="11" text-anchor="end" font-weight="600" fill="'+c.text+'">'+m+'</text>';
    s+='<rect x="'+LP+'" y="'+(y+3)+'" width="'+(N*DW)+'" height="'+(RH-6)+'" fill="currentColor" fill-opacity="0.04"/>';
    let runStart=-1;
    for(let i=0;i<=N;i++){
      const ab=i<N && days[i].a.includes(m);
      if(ab && runStart<0) runStart=i;
      else if(!ab && runStart>=0){
        const x=LP+runStart*DW;
        const w=(i-runStart)*DW;
        const fromD=days[runStart].d, toD=days[i-1].d, dur=i-runStart;
        s+='<rect x="'+x+'" y="'+(y+3)+'" width="'+w+'" height="'+(RH-6)+'" fill="'+c.bg+'" stroke="'+c.text+'" stroke-width="0.3" rx="2"><title>'+m+' · '+fromD+(dur>1?" → "+toD:"")+' ('+dur+' dia'+(dur>1?'s':'')+')</title></rect>';
        runStart=-1;
      }
    }
  });
  // density bar
  const densY=TP+meds.length*RH+GAP;
  s+='<text x="'+(LP-6)+'" y="'+(densY+DH/2+4)+'" font-size="10" text-anchor="end" fill="currentColor" opacity="0.6">Total</text>';
  s+='<line x1="'+LP+'" y1="'+(densY+DH)+'" x2="'+(LP+N*DW)+'" y2="'+(densY+DH)+'" stroke="currentColor" stroke-opacity="0.2" stroke-width="0.5"/>';
  const palette=["transparent","#cfeac8","#a6d99b","#fde68a","#fbbf24","#f97316","#dc2626"];
  days.forEach((d,i)=>{
    const n=d.a.length;
    if(n===0) return;
    const fill=palette[Math.min(n,6)];
    const h=Math.min(n,6)*(DH/6);
    const x=LP+i*DW;
    s+='<rect x="'+x+'" y="'+(densY+DH-h)+'" width="'+DW+'" height="'+h+'" fill="'+fill+'"><title>'+d.d+': '+n+' ausente'+(n>1?'s':'')+' ('+d.a.join(',')+')</title></rect>';
  });
  s+='</svg>';
  // Header + per-médico totals + chart + critical weeks
  let h='<p style="font-size:12px;color:#666;margin-bottom:8px">Sobreposições de ausências — barra por elemento. Linhas finas = segundas; linhas grossas = meses. Linha azul tracejada = hoje. Barra inferior = nº de ausentes/dia (densidade).</p>';
  if(isMob) h+='<p style="font-size:11px;color:#999;text-align:center;margin:0 0 8px;font-weight:500">← arrasta o quadro para ver outras semanas →</p>';
  h+='<div class="overlap-scroll" style="overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border:0.5px solid #e0ddd5;border-radius:8px;padding:8px 4px">'+s+'</div>';
  // Critical weeks (≥3 num dia ou ≥4 pessoas distintas na semana)
  const weeks={};
  days.forEach(d=>{
    const dt=new Date(d.d+"T00:00:00");
    const mn=new Date(dt); mn.setDate(dt.getDate()-((dt.getDay()+6)%7));
    const k=mn.toISOString().slice(0,10);
    (weeks[k]=weeks[k]||[]).push(d);
  });
  const cw=[];
  Object.keys(weeks).sort().forEach(k=>{
    const ws=weeks[k];
    const maxDay=Math.max(...ws.map(d=>d.a.length));
    const totalDP=ws.reduce((s,d)=>s+d.a.length,0);
    const peopleSet=new Set();
    ws.forEach(d=>d.a.forEach(m=>peopleSet.add(m)));
    if(maxDay>=3 || peopleSet.size>=4) cw.push({week:k,maxDay,totalDP,people:[...peopleSet]});
  });
  if(cw.length>0){
    h+='<div style="margin-top:14px"><div style="font-weight:600;font-size:13px;color:#791f1f;margin-bottom:6px">Semanas com alta sobreposição ('+cw.length+')</div><div style="font-size:11px;color:#666;margin-bottom:6px">≥3 ausentes num dia, ou ≥4 pessoas distintas na semana — candidatas para reagendamento.</div>';
    cw.forEach(c=>{
      const ws2=c.week.slice(8,10)+"/"+c.week.slice(5,7);
      const we=new Date(new Date(c.week+"T00:00:00").getTime()+6*86400000).toISOString().slice(0,10);
      const wef=we.slice(8,10)+"/"+we.slice(5,7);
      const sev=c.maxDay>=4?"#fcebeb":"#faeeda";
      const sc=c.maxDay>=4?"#791f1f":"#854f0b";
      h+='<div class="al" style="background:'+sev+';cursor:pointer" onclick="sV(\'cal\');setTimeout(()=>sD(\''+c.week+'\'),50)"><strong style="color:'+sc+'">Semana '+ws2+' – '+wef+'</strong>Pico '+c.maxDay+' ausente'+(c.maxDay>1?'s':'')+' num dia · '+c.totalDP+' dia-pessoa · '+c.people.join(", ")+'</div>';
    });
    h+='</div>';
  }
  r.innerHTML=h;
  if(isMob && todayIdx>=0){
    const sc=r.querySelector(".overlap-scroll");
    if(sc) requestAnimationFrame(()=>{const tx=LP+todayIdx*DW-sc.clientWidth/2;sc.scrollLeft=Math.max(0,tx);});
  }
}
function sV(v){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));
  document.getElementById("view-cal").style.display=v==="cal"?"block":"none";
  document.getElementById("view-alert").classList.toggle("show",v==="alert");
  document.getElementById("view-subs").classList.toggle("show",v==="subs");
  document.getElementById("view-overlap").classList.toggle("show",v==="overlap");
  if(v==="overlap") bO();
}
window.sV=sV; window.sD=sD;
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>sV(t.dataset.view)));
document.getElementById("btn-today").addEventListener("click",()=>{
  sV("cal");
  sD(TODAY);
  const el=document.querySelector(".d.today");
  if(el) requestAnimationFrame(()=>el.scrollIntoView({block:"center",behavior:"smooth"}));
});
// SWIPE MOBILE - navegar dia anterior/proximo no quadro inferior (#det).
// So ativa em touch + viewport <=740px; resolve conflito com scroll vertical via detecao
// de direcao dominante (precisa |dx|>|dy|*1.3 e percurso horizontal >50px).
(function(){
  const det=document.getElementById("det");
  if(!det)return;
  const mq=window.matchMedia("(pointer:coarse) and (max-width:740px)");
  let curD=TODAY;
  const _sD=window.sD;
  window.sD=function(date){curD=date;return _sD(date);};
  let sx=0,sy=0,st=0,dir=null,active=false;
  det.addEventListener("touchstart",function(e){
    if(!mq.matches||e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();dir=null;active=true;
  },{passive:true});
  det.addEventListener("touchmove",function(e){
    if(!active||!mq.matches)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(dir===null && (Math.abs(dx)>10||Math.abs(dy)>10)){
      dir=(Math.abs(dx)>Math.abs(dy)*1.3)?"h":"v";
    }
    if(dir==="h")e.preventDefault();
  },{passive:false});
  det.addEventListener("touchend",function(e){
    if(!active||!mq.matches){active=false;return;}
    active=false;
    if(dir!=="h")return;
    const t=e.changedTouches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy,dt=Date.now()-st;
    if(dt>800||Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)*1.3)return;
    const idx=NRI.days.findIndex(x=>x.d===curD);
    if(idx<0)return;
    const nidx=dx<0?Math.min(NRI.days.length-1,idx+1):Math.max(0,idx-1);
    if(nidx===idx)return;
    const nd=NRI.days[nidx].d;
    det.style.transform=dx<0?"translateX(-14px)":"translateX(14px)";
    det.style.opacity="0.4";
    setTimeout(function(){
      sD(nd);
      det.style.transform=dx<0?"translateX(14px)":"translateX(-14px)";
      requestAnimationFrame(function(){
        det.style.transform="translateX(0)";
        det.style.opacity="1";
      });
      setTimeout(function(){det.style.transform="";det.style.opacity="";},220);
    },130);
  },{passive:true});
})();
bY();bL();bA();bS();sD(TODAY);
</script></body></html>
