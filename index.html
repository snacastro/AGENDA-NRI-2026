const TODAY=new Date().toISOString().slice(0,10);
const M=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const NU={0:"PP",1:"AM",2:"MR",3:"AA",4:null};
// Pares de Angio matinal 8-14h por dia (confirmado nos Horários):
// Seg=AA+AM, Ter=SC+MR, Qua=SC+PP, Qui=SC+MR, Sex=PP+MR
const ANGIO_PAIRS={0:["AA","AM"],1:["SC","MR"],2:["SC","PP"],3:["SC","MR"],4:["PP","MR"]};
function normT(t){
  const s=(t||"").toLowerCase().replace(/[^a-zà-ú0-9/]/g,"");
  const keys=new Set();
  s.split("/").forEach(p=>{
    if(p.includes("angio"))keys.add("angio");
    else if(p.startsWith("rm"))keys.add("rm");
    else if(p.includes("unic"))keys.add("unic");
    else if(p.startsWith("tc"))keys.add("tc");
    else if(p.includes("consulta"))keys.add("consulta");
    else if(p.includes("doppler"))keys.add("doppler");
    else if(p.includes("gest"))keys.add("gestao");
    else if(p)keys.add(p);
  });
  return keys;
}
function matchSub(taskTxt,subs){
  if(!subs||!subs.length)return null;
  const tk=normT(taskTxt);
  for(const s of subs){
    const sk=normT(s.t);
    for(const k of tk){ if(sk.has(k))return s; }
  }
  return null;
}
function filterTask(t){
  // Consulta cancela quando ausente; Gestão não é clínica (organização da equipa) — omitir ambas.
  if(!t)return null;
  const isExcl = p => /^(consulta|gest[aã]o)$/i.test(p.trim());
  if(isExcl(t))return null;
  const parts=t.split("/").filter(p=>!isExcl(p));
  return parts.length?parts.join("/"):null;
}
function dB(d){
  if(d.a.length===0)return null;
  if(d.a.length===1){const c=NRI.colors[d.a[0]];return c?c.bg:null;}
  const cs=d.a.map(p=>NRI.colors[p]?NRI.colors[p].bg:"#CCC");
  const n=cs.length;
  return "linear-gradient(135deg, "+cs.map((c,i)=>c+" "+(i/n*100).toFixed(0)+"%, "+c+" "+((i+1)/n*100).toFixed(0)+"%").join(", ")+")";
}
function dC(d){
  const c=["d"];
  if(d.a.length===0){
    if(d.t==="F")c.push("holiday");
    else if(d.t==="S"||d.t==="D")c.push("weekend");
  }
  if(d.d===TODAY)c.push("today");
  return c.join(" ");
}

}

    h+='<span style="background:'+c.bg+";color:"+c.text+'">'+k+" · "+c.label+"</span>";
  });
  h+='<span style="background:#FFE0B2;color:#8B4513">feriado</span><span style="background:#ededeb;color:#666">FDS sem ausências</span><span style="background:#185fa5;color:#fff">hoje</span><span style="background:#2E7D32;color:#fff">● substituição</span>';
  r.innerHTML=h;
}
function sD(date){
  document.querySelectorAll(".d.selected").forEach(e=>e.classList.remove("selected"));
  const e=document.querySelector('.d[data-date="'+date+'"]');
  if(e)e.classList.add("selected");
  const d=NRI.days.find(x=>x.d===date);
  if(!d)return;
  const subsHere=(NRI.subs[date]||[]).slice();
  const usedSubIdx=new Set();
  const dt=new Date(date+"T12:00:00");
  const wd=(dt.getDay()+6)%7;
  const wn=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
  const df=dt.toLocaleDateString("pt-PT",{day:"numeric",month:"long",year:"numeric"});
  const we=d.t==="S"||d.t==="D"||d.t==="F";
  const mt=d.h?"Feriado · "+d.h:(we?"Fim-de-semana":"Dia útil");
  let h='<div class="dhd"><div><p class="ddt">'+wn[wd]+", "+df+'</p><span class="dmt">'+mt+'</span></div></div><div class="drw"><span class="dlb">Ausências</span><div>';
  if(d.a.length===0)h+='<span style="color:#999;font-size:13px">—</span>';
  else d.a.forEach(m=>{
    const co=wd<5&&NRI.hasSched[String(wd)].includes(m);
    const c=NRI.colors[m];
    const sub=co?"":" · não conta";
    if(co)h+='<span class="pl" style="background:'+c.bg+";color:"+c.text+'">'+m+sub+"</span>";
    else h+='<span class="pl absnc">'+m+sub+"</span>";
  });
  h+="</div></div>";
  if(we){
    const cf = d.f && d.a.includes(d.f);
    const fLabel = d.f ? ('<span class="pl '+(cf?'bad':'esc')+'">'+d.f+(cf?' ⚠ AUSENTE':'')+'</span>') : '<span style="color:#a32d2d;font-size:13px">não atribuído</span>';
    h+='<div class="drw'+(cf?' conflict':'')+'"><span class="dlb">Cobertura dia todo</span><div>'+fLabel+(cf?' <span style="color:#c0392b;font-weight:600;font-size:12px">⚠ INCOMPATIBILIDADE: escalado mas marcado ausente</span>':'')+"</div></div>";
  } else {
    {
      // Médico principal de UNIC do dia (8-20h)
      const u8 = NU[wd];
      let dayLabel;
      let conflictDay = false;
      if (u8) {
        if (d.a.includes(u8)) {
          // Verificar se há substituto UNIC registado para hoje
          const unicSub = matchSub("UNIC", subsHere);
          if (unicSub) {
            dayLabel = '<span class="pl absnc">'+u8+' ausente</span> <span class="subarr">→ '+unicSub.s+' cobre 8-20h</span>';
            const idx = subsHere.indexOf(unicSub);
            if (idx >= 0) usedSubIdx.add(idx);
          } else {
            dayLabel = '<span class="pl bad">⚠ '+u8+' ausente — a definir substituição (turno 8-20h)</span>';
            conflictDay = true;
          }
        } else {
          dayLabel = '<span class="pl esc">'+u8+'</span>';
        }
      } else {
        // sexta: UNIC rotativa MR/PP
        dayLabel = '<span style="font-size:12px;color:#666">via Horários (UNIC rotativa MR/PP)</span>';
      }
      h+='<div class="drw'+(conflictDay?' conflict':'')+'"><span class="dlb">Dia 8-20h</span><div>'+dayLabel+'</div></div>';
    }
    const u=NU[wd];
    const cn = d.n && d.a.includes(d.n);
    h+='<div class="drw'+(cn?' conflict':'')+'"><span class="dlb">Noite 20-8h</span><div>';
    if(d.n){
      h+='<span class="pl '+(cn?'bad':'esc')+'">'+d.n+(cn?' ⚠ AUSENTE':'')+"</span>";
      if(cn) h+=' <span style="color:#c0392b;font-weight:600;font-size:12px">⚠ INCOMPATIBILIDADE: escalado mas marcado ausente</span>';
      else if(u&&d.n!==u&&!d.a.includes(u))h+='<span class="pl warn">deviação ('+u+")</span>";
      else if(u&&d.a.includes(u))h+='<span class="pl warn">substituto de '+u+"</span>";
    } else h+=u?'<span style="font-size:13px">padrão: '+u+"</span>":'<span style="color:#999;font-size:13px">—</span>';
    h+="</div></div>";
    if(d.a.length>0&&wd<5){
      let uc=[];
      d.a.forEach(m=>{((NRI.weekly[wd]||{})[m]||[]).forEach(([p,t])=>{
        // UNIC 14-17h é assegurada pelo médico da manhã — não conta como descoberto
        if(p==="14-17" && /^UNIC$/i.test(t.trim())) return;
        const ft=filterTask(t);if(ft)uc.push({m,p,t:ft});
      });});
      // Regra dos pares de Angio matinal: se só 1 do par está ausente, removê-lo do quadro vermelho
      // e adicionar à caixa laranja (angiografia com 1 só médico).
      const pair=ANGIO_PAIRS[wd];
      const angioAlerts=[];
      if(pair){
        const absInPair=pair.filter(m=>d.a.includes(m));
        if(absInPair.length===1){
          const alone=pair.find(m=>!d.a.includes(m));
          let note="";
          // Sexta: se MR/PP aparece na esquerda, normalmente significa que está de UNIC sexta (rotativo), não ausência
          if(wd===4&&(absInPair[0]==="MR"||absInPair[0]==="PP")){
            note=" — "+absInPair[0]+" provavelmente de UNIC sexta (rotativo MR/PP)";
            if(d.a.includes("AA"))note+=" · AA também ausente";
          } else if(wd===4&&d.a.includes("AA")){
            note=" — AA ausente, pode precisar cobrir UNIC";
          }
          angioAlerts.push({absent:absInPair[0],alone:alone,note:note});
          uc=uc.filter(x=>!(x.p==="8-14"&&/angio/i.test(x.t)&&x.m===absInPair[0]));
        }
        // Se ambos do par à sexta na esquerda: 1 UNIC + 1 ausente → Angio descoberto (deixar uc tal como está, ambos aparecem em vermelho)
      }
      if(uc.length>0){
        h+='<div class="uncov"><div class="uctt">⚠ Tarefas clínicas a descoberto</div><ul>';
        uc.forEach(x=>{
          const match=matchSub(x.t,subsHere);
          let arrow="";
          if(match){
            arrow=' <span class="subarr">→ '+match.s+"</span>";
            const idx=subsHere.indexOf(match);
            if(idx>=0)usedSubIdx.add(idx);
          }
          h+="<li><strong>"+x.m+"</strong> "+x.p+"h → "+x.t+arrow+"</li>";
        });
        h+="</ul>";
        if(d.n){
          const friRule = wd===4 ? "Tarde 14h-20h + Noite 20h-8h" : "Noite 20h-8h";
          h+='<div class="nightcov">ℹ <strong>'+friRule+'</strong> coberta por <strong>'+d.n+'</strong> (escala)</div>';
        }
        h+="</div>";
      } else if(angioAlerts.length===0) h+='<div class="ok">✓ Sem tarefas clínicas a descoberto</div>';
      // Caixa laranja: Angio com 1 só médico
      if(angioAlerts.length>0){
        h+='<div class="partial"><div class="ptt">⚠ Angiografia 8-14h com 1 só médico</div><ul>';
        angioAlerts.forEach(a=>h+='<li><strong>'+a.absent+'</strong> ausente → <strong>'+a.alone+'</strong> sozinho na Angio'+a.note+'</li>');
        h+="</ul></div>";
      }
    }
  }
  const extras=subsHere.filter((_,i)=>!usedSubIdx.has(i));
  if(extras.length){
    h+='<div class="subextra"><div class="subextt">↪ Substituições adicionais</div><ul>';
    extras.forEach(s=>h+="<li><strong>"+s.t+"</strong> → "+s.s+(s.n?' <span style="opacity:.8">·'+s.n+"</span>":"")+"</li>");
    h+="</ul></div>";
  }
  // Painel Anestesia de prevenção
  const anestArr = (NRI.anest && NRI.anest[date]) || [];
  let anestHTML = '<div class="anest"><div class="anestt">🩺 Anestesia de prevenção</div>';
  if (anestArr.length === 0) {
    anestHTML += '<div class="row empty">sem informação</div>';
  } else {
    anestArr.forEach(a => {
      const shiftLabel = a.shift === 'all' ? '' : '<span class="shift">'+(a.shift==='D'?'Dia':'Noite')+'</span>';
      const name = a.name && a.name.trim() ? a.name : '<span class="empty">sem informação</span>';
      const phone = a.phone && a.phone.trim() ? ' · <a href="tel:'+a.phone+'">'+a.phone+'</a>' : '';
      anestHTML += '<div class="row">'+shiftLabel+name+phone+'</div>';
    });
  }
  anestHTML += '</div>';
  h += anestHTML;
  document.getElementById("det").innerHTML=h;
  document.getElementById("det").classList.add("show");
}
function bA(){
  const t=new Date(TODAY+"T00:00:00");
  const fu=NRI.days.filter(d=>new Date(d.d+"T00:00:00")>=t);
  // Detectar incompatibilidades (escalado tambem ausente) em todo o ano
  const conflicts = NRI.days.filter(d => {
    const sched = d.n || d.f;
    return sched && d.a.includes(sched);
  });
  let h = "";
  if(conflicts.length > 0){
    h += '<div style="background:#fcebeb;border:2px solid #c0392b;border-radius:8px;padding:12px;margin-bottom:14px"><div style="font-weight:700;color:#c0392b;margin-bottom:8px;font-size:14px">🚨 INCOMPATIBILIDADES CRÍTICAS ('+conflicts.length+' dia'+(conflicts.length>1?'s':'')+')</div><div style="font-size:12px;color:#791f1f;margin-bottom:8px">Médico escalado para a noite/cobertura mas marcado como ausente no mesmo dia — risco de disrupção do serviço.</div><ul style="margin:0;padding-left:18px;color:#501313;font-size:13px">';
    conflicts.forEach(c => {
      const dt = new Date(c.d + "T12:00:00");
      const wn = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
      const wd = (dt.getDay()+6)%7;
      const df = dt.toLocaleDateString("pt-PT",{day:"numeric",month:"short"});
      const sched = c.n || c.f;
      const future = new Date(c.d+"T00:00:00") >= t ? "" : " <span style='opacity:.6'>(passado)</span>";
      h += '<li style="margin:3px 0;cursor:pointer" onclick="sV(\'cal\');setTimeout(()=>sD(\''+c.d+'\'),50)"><strong>'+wn[wd]+', '+df+'</strong> ('+c.d+') · <strong style="color:#c0392b">'+sched+'</strong> escalado mas ausente'+future+'</li>';
    });
    h += '</ul></div>';
  }
  const wk={};
  fu.forEach(d=>{
    const dt=new Date(d.d+"T00:00:00");
    const mn=new Date(dt);
    mn.setDate(dt.getDate()-((dt.getDay()+6)%7));
    const k=mn.toISOString().slice(0,10);
    (wk[k]=wk[k]||[]).push(d);
  });
  h+='<p style="font-size:12px;color:#666;margin-bottom:10px">Semanas com 1+ dia de multi-ausência.</p>';
  const cr=[];
  Object.keys(wk).sort().forEach(k=>{
    const ws=wk[k];
    const mu=ws.filter(d=>d.m);
    if(mu.length>=1){
      const ao=new Set();
      ws.forEach(d=>d.a.forEach(m=>ao.add(m)));
      cr.push({week:k,multi:mu,allOff:Array.from(ao)});
    }
  });
  cr.slice(0,12).forEach(c=>{
    const we=new Date(new Date(c.week+"T00:00:00").getTime()+6*86400000).toISOString().slice(0,10);
    const ws=c.week.slice(8,10)+"/"+c.week.slice(5,7);
    const wef=we.slice(8,10)+"/"+we.slice(5,7);
    const sev=c.multi.length>=4?"#fcebeb":"#faeeda";
    const sc=c.multi.length>=4?"#791f1f":"#854f0b";
    h+='<div class="al" style="background:'+sev+'"><strong style="color:'+sc+'">Semana '+ws+" – "+wef+"</strong>"+c.multi.length+" dia(s) com 2+ ausentes · "+c.allOff.join(", ")+"</div>";
  });
  if(cr.length===0)h+='<div class="al" style="background:#e1f5ee;color:#04342c"><strong style="color:#085041">Sem semanas críticas</strong>Não há multi-ausências futuras.</div>';
  document.getElementById("view-alert").innerHTML=h;
}
function bS(){
  const r=document.getElementById("view-subs");
  const dates=Object.keys(NRI.subs).sort();
  if(dates.length===0){
    r.innerHTML='<div class="al" style="background:#e1f5ee;color:#04342c"><strong style="color:#085041">Sem substituições registadas</strong>Adiciona linhas na folha "Substitutos" do Agenda_NRI_2026.xlsx.</div>';
    return;
  }
  let h='<p style="font-size:12px;color:#666;margin-bottom:10px">'+NRI.subsCount+' substituições registadas — clica numa data para abrir o dia.</p>';
  dates.forEach(d=>{
    const dt=new Date(d+"T12:00:00");
    const wn=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
    const df=dt.toLocaleDateString("pt-PT",{day:"numeric",month:"short"});
    const wd=(dt.getDay()+6)%7;
    h+='<div class="al" style="background:#e8f5e9;color:#1b5e20;cursor:pointer" onclick="sV(\'cal\');setTimeout(()=>sD(\''+d+'\'),50)"><strong style="color:#085041">'+wn[wd]+", "+df+" ("+d+")</strong>";
    NRI.subs[d].forEach(s=>{
      h+="<div>"+s.t+" → <strong>"+s.s+"</strong>"+(s.n?' <span style="opacity:.7">· '+s.n+"</span>":"")+"</div>";
    });
    h+="</div>";
  });
  r.innerHTML=h;
}
function sV(v){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));
  document.getElementById("view-cal").style.display=v==="cal"?"block":"none";
  document.getElementById("view-alert").classList.toggle("show",v==="alert");
  document.getElementById("view-subs").classList.toggle("show",v==="subs");
}
window.sV=sV; window.sD=sD;
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>sV(t.dataset.view)));
bY();bL();bA();bS();sD(TODAY);
</script></body></html>
